name: Tag Release

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'chore: bump version') || contains(github.event.head_commit.message, 'release-automation')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so the pushed tag triggers the Release workflow (the default
          # GITHUB_TOKEN cannot trigger another workflow).
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Pushed $TAG - triggers the Release build"
