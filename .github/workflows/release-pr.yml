name: Create Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-pr:
    name: Create/Update Release PR
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release; creating initial release"
            echo "needs_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=minor" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Latest tag: $LATEST_TAG"
          BREAKING=$(git log "$LATEST_TAG"..HEAD --oneline -E --grep="^feat!:|^fix!:|BREAKING CHANGE" | wc -l | tr -d ' ')
          FEATURES=$(git log "$LATEST_TAG"..HEAD --oneline --grep="^feat" | wc -l | tr -d ' ')
          FIXES=$(git log "$LATEST_TAG"..HEAD --oneline --grep="^fix" | wc -l | tr -d ' ')
          echo "breaking=$BREAKING features=$FEATURES fixes=$FIXES"
          if [ "$BREAKING" -gt 0 ]; then
            echo "bump_type=major" >> $GITHUB_OUTPUT; echo "needs_release=true" >> $GITHUB_OUTPUT
          elif [ "$FEATURES" -gt 0 ]; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT; echo "needs_release=true" >> $GITHUB_OUTPUT
          elif [ "$FIXES" -gt 0 ]; then
            echo "bump_type=patch" >> $GITHUB_OUTPUT; echo "needs_release=true" >> $GITHUB_OUTPUT
          else
            echo "No conventional commits since $LATEST_TAG - skipping"
            echo "needs_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute new version
        if: steps.check.outputs.needs_release == 'true'
        id: bump
        run: |
          CURRENT=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          case "${{ steps.check.outputs.bump_type }}" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT -> $NEW"

      - name: Create/update release branch
        if: steps.check.outputs.needs_release == 'true'
        run: |
          git fetch origin
          if git ls-remote --heads origin release-automation | grep -q release-automation; then
            git push origin --delete release-automation || true
          fi
          git checkout -b release-automation

      - name: Bump version
        if: steps.check.outputs.needs_release == 'true'
        run: |
          CUR=${{ steps.bump.outputs.current }}
          NEW=${{ steps.bump.outputs.new_version }}
          sed -i "s/^version = \"$CUR\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/^__version__ = \"$CUR\"/__version__ = \"$NEW\"/" src/__init__.py

      - name: Generate changelog
        if: steps.check.outputs.needs_release == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ steps.bump.outputs.new_version }} --output CHANGELOG.md

      - name: Commit and push
        if: steps.check.outputs.needs_release == 'true'
        run: |
          git add pyproject.toml src/__init__.py CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push -u origin release-automation --force

      - name: Create or update PR
        if: steps.check.outputs.needs_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW=${{ steps.bump.outputs.new_version }}
          PR_NUM=$(gh pr list --head release-automation --base main --json number --jq '.[0].number')
          PR_BODY="## Release v$NEW

          Automated version bump and changelog.

          ### When merged
          1. A \`v$NEW\` tag is created automatically
          2. Binaries are built for all platforms
          3. A GitHub Release is published

          Generated by .github/workflows/release-pr.yml"
          if [ -z "$PR_NUM" ]; then
            gh pr create --base main --head release-automation \
              --title "chore: release v$NEW" --body "$PR_BODY"
          else
            gh pr edit "$PR_NUM" --title "chore: release v$NEW" --body "$PR_BODY"
          fi
